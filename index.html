<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directional Photo Interaction</title>
    <meta name="description" content="Interactive profile photo that follows your mouse cursor.">

    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            /* Prevent scrollbars */
        }

        .container {
            position: relative;
            width: 300px;
            /* Adjust based on actual image size */
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo {
            width: 100%;
            height: auto;
            border-radius: 50%;
            /* Make it circular if images are square, or just rounded */
            object-fit: cover;
            transition: transform 0.1s ease;
            cursor: pointer;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            user-select: none;
            -webkit-user-drag: none;
        }

        .tooltip {
            position: absolute;
            bottom: 20px;
            /* Position at the bottom */
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            /* Let clicks pass through to the image */
            transition: opacity 0.2s ease, transform 0.2s ease;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        /* Show tooltip and scale it up slightly when hovering container */
        .container:hover .tooltip {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* Ambient background glow */
        .glow {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(15, 23, 42, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="container" id="photoContainer">
        <div class="glow"></div>
        <img src="images/center.png" alt="Profile Logic" class="photo" id="profileImage">
        <div class="tooltip">Click me</div>
    </div>

    <script>
        const image = document.getElementById('profileImage');
        const container = document.getElementById('photoContainer');

        let isHovering = false;
        let isClicking = false;
        let clickCount = 0; // Track number of clicks to alternate

        // Configuration for images
        const images = {
            center: 'images/center.png',
            centerBlush: 'images/centerblush.png',
            centerTongue: 'images/centertongue.png',
            up: 'images/up.png',
            down: 'images/down.png',
            left: 'images/left.png',
            right: 'images/right.png',
            upLeft: 'images/upleft.png',
            upRight: 'images/upright.png',
            downLeft: 'images/downleft.png',
            downRight: 'images/downright.png'
        };

        // Preload images to prevent flickering
        Object.values(images).forEach(src => {
            const img = new Image();
            img.src = src;
        });

        // Mouse Move Handler
        document.addEventListener('mousemove', (e) => {
            if (isHovering) return; // Logic handled by hover state

            const rect = image.getBoundingClientRect();
            // Calculate center of the image
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Calculate angle from center to mouse
            // Math.atan2 returns angle in radians, -PI to +PI
            // 0 is right (3 o'clock), positive is clockwise (down), negative is counter-clockwise (up)
            const dx = e.clientX - centerX;
            const dy = e.clientY - centerY;
            let angle = Math.atan2(dy, dx) * (180 / Math.PI);

            // Normalize angle to 0-360 for easier segmentation
            // atan2: 0=Right, 90=Down, 180=Left, -90=Up
            // We want to slice the circle into 8 segments of 45 degrees each.
            // Let's adjust angle so 0 is Up to make it mentaly easier, or just map standard math angles.
            // Standard: Right=0, Down=90, Left=180, Up=-90

            // Segments:
            // Right: -22.5 to 22.5
            // DownRight: 22.5 to 67.5
            // Down: 67.5 to 112.5
            // DownLeft: 112.5 to 157.5
            // Left: 157.5 to 180 AND -180 to -157.5
            // UpLeft: -157.5 to -112.5
            // Up: -112.5 to -67.5
            // UpRight: -67.5 to -22.5

            let direction = 'center';

            if (angle >= -22.5 && angle < 22.5) {
                direction = 'right';
            } else if (angle >= 22.5 && angle < 67.5) {
                direction = 'downRight';
            } else if (angle >= 67.5 && angle < 112.5) {
                direction = 'down';
            } else if (angle >= 112.5 && angle < 157.5) {
                direction = 'downLeft';
            } else if (angle >= 157.5 || angle < -157.5) {
                direction = 'left';
            } else if (angle >= -157.5 && angle < -112.5) {
                direction = 'upLeft';
            } else if (angle >= -112.5 && angle < -67.5) {
                direction = 'up';
            } else if (angle >= -67.5 && angle < -22.5) {
                direction = 'upRight';
            }

            // Update image if changed
            const newSrc = images[direction];
            // Only update if src is different and effectively valid (we assume newSrc is correct key)
            if (newSrc && !image.src.endsWith(newSrc)) {
                image.src = newSrc;
            }
        });

        // Hover Logic
        container.addEventListener('mouseenter', () => {
            isHovering = true;
            if (!isClicking) {
                image.src = images.center;
            }
        });

        container.addEventListener('mouseleave', () => {
            isHovering = false;
            isClicking = false; // Reset click state just in case
            // Image will update on next mousemove event or we can trigger one manually if needed, 
            // but usually the user moves the mouse OUT so mousemove fires on document.
        });

        // Click Logic
        container.addEventListener('mousedown', () => {
            isClicking = true;
            // Alternating logic: Even = Tongue, Odd = Blush (since we start at 0, first click makes it 1 -> Tongue? User said First time tongue.
            // Let's increment first then check.
            clickCount++;

            // "First time you click... center tongue"
            // Click 1: Tongue
            // Click 2: Blush
            // Click 3: Tongue

            if (clickCount % 2 !== 0) {
                image.src = images.centerTongue;
            } else {
                image.src = images.centerBlush;
            }
        });

        document.addEventListener('mouseup', () => {
            if (isClicking) {
                isClicking = false;
                // If still hovering, go back to center, otherwise correct direction will pick up on move
                if (isHovering) {
                    image.src = images.center;
                }
            }
        });

    </script>
</body>

</html>
